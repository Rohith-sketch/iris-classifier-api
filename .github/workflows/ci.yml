name: CI

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with: 
          python-version: "3.11"
          cache: "pip"  # This is the pro-tip from the bottom of your image!
          
      - name: Install dependencies
        run: pip install -r requirements.txt pytest httpx
        
      - name: Run Pytest
        run: pytest -v